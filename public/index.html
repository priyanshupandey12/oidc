<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OIDC Flow Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080f;--bg2:#0f0f1a;--bg3:#14141f;--bg4:#1c1c2a;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#e2e2f0;--muted:#606078;--dim:#3a3a50;
  --accent:#7c6dfa;--accent-l:#a78bfa;
  --green:#34d399;--green-bg:rgba(52,211,153,0.08);--green-b:rgba(52,211,153,0.25);
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,0.08);--amber-b:rgba(251,191,36,0.25);
  --red:#f87171;--red-bg:rgba(248,113,113,0.08);--red-b:rgba(248,113,113,0.25);
  --cyan:#22d3ee;--cyan-bg:rgba(34,211,238,0.06);--cyan-b:rgba(34,211,238,0.2);
  --purple-bg:rgba(124,109,250,0.08);--purple-b:rgba(124,109,250,0.25);
  --mono:'JetBrains Mono',monospace;--display:'Syne',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,109,250,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(124,109,250,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

header{position:relative;z-index:10;padding:18px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(8,8,15,0.9);backdrop-filter:blur(12px)}
.logo{font-family:var(--display);font-size:18px;font-weight:800;display:flex;align-items:center;gap:10px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.35}}
.base-tag{font-size:11px;color:var(--muted);padding:4px 12px;border:1px solid var(--border2);border-radius:100px}

.layout{position:relative;z-index:1;display:grid;grid-template-columns:268px 1fr;height:calc(100vh - 57px)}

.sidebar{border-right:1px solid var(--border);background:var(--bg2);overflow-y:auto;padding:16px 10px;display:flex;flex-direction:column;gap:2px}
.sb-section{font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--dim);padding:10px 10px 5px;margin-top:4px}
.sb-section:first-child{margin-top:0}

.step-btn{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all 0.15s;width:100%;background:transparent;text-align:left}
.step-btn:hover{background:var(--bg4)}
.step-btn.active{background:var(--purple-bg);border-color:var(--purple-b)}
.step-btn.done{background:var(--green-bg)}
.step-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;border:1px solid var(--border2);color:var(--dim);background:var(--bg3);transition:all 0.15s}
.step-btn.active .step-icon{border-color:var(--accent);color:var(--accent);background:var(--purple-bg)}
.step-btn.done .step-icon{border-color:var(--green-b);color:var(--green);background:var(--green-bg)}
.sn{font-size:12px;font-weight:500;color:var(--muted);transition:color 0.15s;line-height:1.3}
.step-btn.active .sn{color:var(--text)}
.step-btn.done .sn{color:var(--green)}
.sep{font-size:10px;color:var(--dim);margin-top:1px}
.step-btn.active .sep{color:var(--accent)}

.state-box{margin-top:auto;padding-top:10px;border-top:1px solid var(--border);margin-left:-10px;margin-right:-10px;padding-left:10px;padding-right:10px}
.st-title{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);padding:8px 0 6px}
.st-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)}
.st-row:last-child{border-bottom:none}
.st-k{font-size:10px;color:var(--dim)}
.st-v{font-size:10px;color:var(--green);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.st-v.empty{color:var(--dim)}

.content{overflow-y:auto;padding:28px 36px;display:flex;flex-direction:column;gap:18px}

.ph{display:flex;align-items:flex-start;gap:14px}
.ph-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ph-title{font-family:var(--display);font-size:22px;font-weight:800;line-height:1.2;margin-top:2px}
.ph-sub{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.7}
.method{font-size:10px;font-weight:700;letter-spacing:0.08em;padding:2px 8px;border-radius:5px;border:1px solid;display:inline-block;margin-bottom:4px}
.m-post{color:var(--amber);border-color:var(--amber-b);background:var(--amber-bg)}
.m-get{color:var(--green);border-color:var(--green-b);background:var(--green-bg)}
.m-cb{color:var(--cyan);border-color:var(--cyan-b);background:var(--cyan-bg)}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px;display:flex;flex-direction:column;gap:14px}
.card-title{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim)}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:0.04em}
.field input,.field textarea{font-family:var(--mono);font-size:12px;padding:9px 12px;border:1px solid var(--border2);border-radius:8px;background:var(--bg3);color:var(--text);width:100%;transition:border-color 0.15s;resize:none}
.field input:focus,.field textarea:focus{outline:none;border-color:rgba(124,109,250,0.5)}
.field input::placeholder,.field textarea::placeholder{color:var(--dim)}
.field input.af{border-color:var(--purple-b);background:rgba(124,109,250,0.05)}
.field input.hv{border-color:var(--green-b);background:rgba(52,211,153,0.04)}

.btn{padding:9px 18px;border-radius:8px;font-family:var(--mono);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;border:1px solid var(--border2);background:var(--bg3);color:var(--text)}
.btn:hover{background:var(--bg4);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-p{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-p:hover{opacity:0.88;background:var(--accent);transform:translateY(-1px)}
.btn-sm{padding:6px 14px;font-size:11px}

.actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.status{font-size:12px;animation:fu 0.3s ease}
.ok{color:var(--green)}.err{color:var(--red)}
@keyframes fu{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}

.resp{font-family:var(--mono);font-size:11px;line-height:1.7;padding:14px;border-radius:10px;border:1px solid var(--border);background:#050509;color:var(--muted);white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto;transition:border-color 0.3s}
.resp.ok{border-color:var(--green-b);color:var(--green)}
.resp.err{border-color:var(--red-b);color:var(--red)}

.info{font-size:12px;color:var(--muted);line-height:1.8;padding:14px 16px;background:var(--bg3);border-radius:10px;border:1px solid var(--border);border-left:3px solid var(--accent)}
.info strong{color:var(--text)}
.info code{background:var(--purple-bg);color:var(--accent-l);padding:1px 6px;border-radius:4px;font-size:11px}

.url-box{padding:12px 14px;border-radius:8px;border:1px solid var(--cyan-b);background:var(--cyan-bg);color:var(--cyan);font-size:11px;font-family:var(--mono);word-break:break-all;line-height:1.6;cursor:pointer;transition:opacity 0.15s}
.url-box:hover{opacity:0.75}

.token-group{display:flex;flex-direction:column;gap:8px}
.tok{padding:10px 14px;border-radius:8px;border:1px solid;word-break:break-all;font-size:10px;line-height:1.6;font-family:var(--mono)}
.tok-label{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px;opacity:0.7}
.tok.access{border-color:var(--amber-b);color:var(--amber);background:var(--amber-bg)}
.tok.refresh{border-color:var(--cyan-b);color:var(--cyan);background:var(--cyan-bg)}
.tok.id{border-color:var(--purple-b);color:var(--accent-l);background:var(--purple-bg)}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>OIDC Visualizer</div>
  <div class="base-tag">localhost:3000</div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sb-section">Company / App</div>
    <button class="step-btn" id="s0" onclick="goStep(0)">
      <div class="step-icon">C</div>
      <div>
        <div class="sn">Register Client</div>
        <div class="sep">POST /client/register</div>
      </div>
    </button>

    <div class="sb-section">User Flow</div>
    <button class="step-btn" id="s1" onclick="goStep(1)">
      <div class="step-icon">1</div>
      <div><div class="sn">Login / Register</div><div class="sep">POST /auth/login</div></div>
    </button>
    <button class="step-btn" id="s2" onclick="goStep(2)">
      <div class="step-icon">2</div>
      <div><div class="sn">Authorize</div><div class="sep">GET /oauth2/authorize</div></div>
    </button>
    <button class="step-btn" id="s3" onclick="goStep(3)">
      <div class="step-icon">3</div>
      <div><div class="sn">Get Auth Code</div><div class="sep">← callback redirect</div></div>
    </button>
    <button class="step-btn" id="s4" onclick="goStep(4)">
      <div class="step-icon">4</div>
      <div><div class="sn">Token Exchange</div><div class="sep">POST /validation/token</div></div>
    </button>
    <button class="step-btn" id="s5" onclick="goStep(5)">
      <div class="step-icon">5</div>
      <div><div class="sn">Userinfo</div><div class="sep">GET /info/userinfo</div></div>
    </button>
    <button class="step-btn" id="s6" onclick="goStep(6)">
      <div class="step-icon">6</div>
      <div><div class="sn">Refresh Token</div><div class="sep">POST /validation/token</div></div>
    </button>

    <div class="state-box">
      <div class="st-title">Saved State</div>
      <div class="st-row"><span class="st-k">client_id</span><span class="st-v empty" id="st-cid">—</span></div>
      <div class="st-row"><span class="st-k">client_secret</span><span class="st-v empty" id="st-cs">—</span></div>
      <div class="st-row"><span class="st-k">user session</span><span class="st-v empty" id="st-sess">—</span></div>
      <div class="st-row"><span class="st-k">auth code</span><span class="st-v empty" id="st-code">—</span></div>
      <div class="st-row"><span class="st-k">access_token</span><span class="st-v empty" id="st-at">—</span></div>
      <div class="st-row"><span class="st-k">refresh_token</span><span class="st-v empty" id="st-rt">—</span></div>
    </div>
  </div>

  <div class="content" id="content"></div>
</div>

<script>
const BASE = 'http://localhost:3000';
const S = { step:0, done:new Set(), clientId:'', clientSecret:'', accessToken:'', refreshToken:'', idToken:'', code:'', session:false, mode:'login' };

function sv(id, val) {
  const el = document.getElementById(id);
  if (!el) return;
  if (val) { el.textContent = val.length > 18 ? val.slice(0,15)+'...' : val; el.className = 'st-v'; }
  else { el.textContent = '—'; el.className = 'st-v empty'; }
}

function updateState() {
  sv('st-cid', S.clientId);
  sv('st-cs', S.clientSecret ? '••••••'+S.clientSecret.slice(-4) : '');
  sv('st-sess', S.session ? '✓ active' : '');
  sv('st-code', S.code ? S.code.slice(0,12)+'...' : '');
  sv('st-at', S.accessToken ? 'JWT ✓' : '');
  sv('st-rt', S.refreshToken ? S.refreshToken.slice(0,12)+'...' : '');
}

const P = {
  0: () => `
    <div class="ph">
      <div class="ph-icon" style="background:var(--purple-bg);border:1px solid var(--purple-b)">🏢</div>
      <div>
        <div class="method m-post">POST</div>
        <div class="ph-title">Register Your App (Client)</div>
        <div class="ph-sub">Pehla step — apni company/app ko provider pe register karo. Tumhe <strong style="color:var(--text)">client_id</strong> aur <strong style="color:var(--text)">client_secret</strong> milega. Yeh automatically baaki steps mein fill ho jaayenge.</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">App Details → /client/register</div>
      <div class="field"><label>App Name</label><input id="r-name" placeholder="My Awesome App" /></div>
      <div class="row2">
        <div class="field"><label>Redirect URI</label><input id="r-ruri" value="http://localhost:3001/callback" /></div>
        <div class="field"><label>Allowed Scopes</label><input id="r-scopes" value="openid email profile" /></div>
      </div>
      <div class="actions">
        <button class="btn btn-p" onclick="doClientReg()">Register App →</button>
        <span class="status" id="cr-s"></span>
      </div>
      <div class="resp" id="cr-r">Waiting for response...</div>
    </div>
    <div class="info"><strong>What happens here?</strong><br/>Tera app provider pe register hota hai. Provider random <code>client_id</code> (UUID) aur <code>client_secret</code> generate karta hai. Secret <strong>bcrypt hash</strong> se DB mein store hota hai. Plain secret sirf ek baar dikhega — provider ko bhi yaad nahi! Yeh secret baaki saare steps mein auto-fill hoga.</div>
  `,

  1: () => `
    <div class="ph">
      <div class="ph-icon" style="background:var(--amber-bg);border:1px solid var(--amber-b)">👤</div>
      <div>
        <div class="method m-post">POST</div>
        <div class="ph-title">User Login / Register</div>
        <div class="ph-sub">User apna account banayega ya login karega. Session cookie milegi jo /authorize pe automatically jayegi.</div>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;gap:0;border:1px solid var(--border2);border-radius:8px;overflow:hidden;width:fit-content">
        <button style="padding:7px 20px;font-size:12px;font-family:var(--mono);cursor:pointer;border:none;background:${S.mode==='login'?'var(--bg4)':'transparent'};color:${S.mode==='login'?'var(--text)':'var(--muted)'};transition:all 0.15s" onclick="setMode('login')">Login</button>
        <button style="padding:7px 20px;font-size:12px;font-family:var(--mono);cursor:pointer;border:none;border-left:1px solid var(--border2);background:${S.mode==='register'?'var(--bg4)':'transparent'};color:${S.mode==='register'?'var(--text)':'var(--muted)'};transition:all 0.15s" onclick="setMode('register')">Register</button>
      </div>
      <div class="row2">
        <div class="field"><label>Email</label><input id="u-email" value="test@example.com" /></div>
        <div class="field"><label>Password</label><input id="u-pass" type="password" value="password123" /></div>
        ${S.mode==='register'?'<div class="field"><label>Name</label><input id="u-name" placeholder="John Doe" /></div>':''}
      </div>
      <div class="actions">
        <button class="btn btn-p" onclick="doAuth()">${S.mode==='login'?'Login →':'Register →'}</button>
        <span class="status" id="auth-s"></span>
      </div>
      <div class="resp" id="auth-r">Waiting for response...</div>
    </div>
    <div class="info"><strong>What happens here?</strong><br/>Server credentials verify karta hai. Session DB mein store hoti hai, browser ko <code>connect.sid</code> cookie milti hai. Yeh cookie /authorize request mein automatically jayegi — user logged in dikhega provider pe.</div>
  `,

  2: () => `
    <div class="ph">
      <div class="ph-icon" style="background:var(--green-bg);border:1px solid var(--green-b)">🔑</div>
      <div>
        <div class="method m-get">GET</div>
        <div class="ph-title">Authorization Request</div>
        <div class="ph-sub">Client user ko provider pe bhejta hai. <code style="background:var(--purple-bg);color:var(--accent-l);padding:1px 6px;border-radius:4px;font-size:11px">client_id</code> auto-filled hai registration se.</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Query Parameters</div>
      <div class="field"><label>Client ID ${S.clientId?'✓ (auto-filled from registration)':''}</label><input id="az-cid" value="${S.clientId}" class="${S.clientId?'af':''}" placeholder="Register your app first..." /></div>
      <div class="row2">
        <div class="field"><label>Redirect URI</label><input id="az-ruri" value="http://localhost:3001/callback" /></div>
        <div class="field"><label>Scope</label><input id="az-scope" value="openid email" /></div>
      </div>
      <div class="field"><label>State (CSRF protection — random string)</label><input id="az-state" value="csrf_${Math.random().toString(36).slice(2,10)}" /></div>
      <div class="actions">
        <button class="btn btn-p" onclick="buildUrl()">Build URL →</button>
        <button class="btn btn-sm" onclick="copyUrl()">Copy URL</button>
        <span class="status" id="az-s"></span>
      </div>
      <div class="card-title">Authorization URL — copy & open in browser</div>
      <div class="url-box" id="az-url" onclick="copyUrl()">Fill fields and click Build URL...</div>
    </div>
    <div class="info"><strong>What happens here?</strong><br/>Browser is URL pe jaata hai. Provider session check karta hai (logged in?). Client validate hota hai — <code>redirect_uri</code>, <code>scopes</code>, <code>client_id</code>. Sab sahi hone pe auth code generate hota hai aur redirect hota hai: <code>?code=ABC&state=xyz</code></div>
  `,

  3: () => `
    <div class="ph">
      <div class="ph-icon" style="background:var(--cyan-bg);border:1px solid var(--cyan-b)">📨</div>
      <div>
        <div class="method m-cb">CALLBACK</div>
        <div class="ph-title">Auth Code Received</div>
        <div class="ph-sub">Browser redirect hone ke baad URL mein code milta hai. Ya DB se lo.</div>
      </div>
    </div>
    <div class="card">
      <div class="info" style="background:var(--bg4)"><strong>DB se lo:</strong><br/><code>SELECT code FROM authorization_codes ORDER BY created_at DESC LIMIT 1;</code><br/><br/>Ya callback URL se copy karo:<br/><code>http://localhost:3001/callback?code=<strong>CODE_YAHAN</strong>&state=xyz</code></div>
      <div class="field"><label>Authorization Code — paste karo</label><input id="ci" placeholder="4ef4e3c72648d34fbaf8ce4bf..." value="${S.code}" /></div>
      <div class="actions">
        <button class="btn btn-p" onclick="saveCode()">Save & Continue →</button>
        <span class="status" id="ci-s"></span>
      </div>
    </div>
    <div class="info"><strong>What happens here?</strong><br/>Yeh code <strong>single-use</strong> aur <strong>10 minutes valid</strong> hota hai. State verify karo — match nahi kiya toh CSRF attack! Client ise /token pe exchange karta hai access token ke liye.</div>
  `,

  4: () => `
    <div class="ph">
      <div class="ph-icon" style="background:var(--amber-bg);border:1px solid var(--amber-b)">🎫</div>
      <div>
        <div class="method m-post">POST</div>
        <div class="ph-title">Token Exchange</div>
        <div class="ph-sub">Sab auto-filled hai — code, client_id, client_secret. Bas Exchange karo!</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Request Body — auto-filled</div>
      <div class="field"><label>Code ${S.code?'✓':''}</label><input id="t-code" value="${S.code}" class="${S.code?'hv':''}" /></div>
      <div class="row2">
        <div class="field"><label>Client ID ${S.clientId?'✓ (auto-filled)':''}</label><input id="t-cid" value="${S.clientId}" class="${S.clientId?'af':''}" /></div>
        <div class="field"><label>Client Secret ${S.clientSecret?'✓ (auto-filled)':''}</label><input id="t-cs" value="${S.clientSecret}" class="${S.clientSecret?'af':''}" /></div>
      </div>
      <div class="field"><label>Redirect URI</label><input id="t-ruri" value="http://localhost:3001/callback" /></div>
      <div class="actions">
        <button class="btn btn-p" onclick="doToken()">Exchange Token →</button>
        <span class="status" id="t-s"></span>
      </div>
      <div class="resp" id="t-r">Waiting for response...</div>
    </div>
    ${S.accessToken?`
    <div class="card">
      <div class="card-title">Tokens Received ✓</div>
      <div class="token-group">
        <div><div class="tok-label" style="color:var(--amber)">Access Token (RS256 JWT · expires in 15min)</div><div class="tok access">${S.accessToken}</div></div>
        ${S.refreshToken?`<div><div class="tok-label" style="color:var(--cyan)">Refresh Token (30 days · stored in DB)</div><div class="tok refresh">${S.refreshToken}</div></div>`:''}
        ${S.idToken?`<div><div class="tok-label" style="color:var(--accent-l)">ID Token (RS256 JWT · user identity)</div><div class="tok id">${S.idToken}</div></div>`:''}
      </div>
    </div>`:''}
    <div class="info"><strong>What happens here?</strong><br/>Server validate karta hai: code exist? Expire hua? Already used? client_id match? redirect_uri same? client_secret valid (bcrypt compare)? Sab sahi hone pe <code>RS256</code> private key se signed JWT tokens issue hote hain. Code ka <code>usedAt</code> set hota hai — replay attack nahi hoga.</div>
  `,

  5: () => `
    <div class="ph">
      <div class="ph-icon" style="background:var(--green-bg);border:1px solid var(--green-b)">👁️</div>
      <div>
        <div class="method m-get">GET</div>
        <div class="ph-title">Userinfo</div>
        <div class="ph-sub">Access token se user ki profile lo. Token <code style="background:var(--purple-bg);color:var(--accent-l);padding:1px 6px;border-radius:4px;font-size:11px">auto-filled</code> hai.</div>
      </div>
    </div>
    <div class="card">
      <div class="field"><label>Access Token ${S.accessToken?'✓ (auto-filled)':''}</label><textarea id="ui-t" rows="3" class="${S.accessToken?'af':''}">${S.accessToken}</textarea></div>
      <div class="actions">
        <button class="btn btn-p" onclick="doUserinfo()">Fetch Userinfo →</button>
        <span class="status" id="ui-s"></span>
      </div>
      <div class="resp" id="ui-r">Waiting for response...</div>
    </div>
    <div class="info"><strong>What happens here?</strong><br/>Server <code>Authorization: Bearer token</code> header se token nikalta hai. <code>PUBLIC_KEY</code> se <code>RS256</code> verify karta hai — koi DB call nahi! Yahi resource servers karte hain. Valid hone pe user info bina <code>passwordHash</code> ke return hoti hai.</div>
  `,

  6: () => `
    <div class="ph">
      <div class="ph-icon" style="background:var(--cyan-bg);border:1px solid var(--cyan-b)">♻️</div>
      <div>
        <div class="method m-post">POST</div>
        <div class="ph-title">Refresh Token</div>
        <div class="ph-sub">Access token expire ho gaya? Refresh token se naya lo — bina login kiye. Sab auto-filled hai!</div>
      </div>
    </div>
    <div class="card">
      <div class="field"><label>Refresh Token ${S.refreshToken?'✓ (auto-filled)':''}</label><input id="rf-rt" value="${S.refreshToken}" class="${S.refreshToken?'hv':''}" /></div>
      <div class="row2">
        <div class="field"><label>Client ID ${S.clientId?'✓ (auto-filled)':''}</label><input id="rf-cid" value="${S.clientId}" class="${S.clientId?'af':''}" /></div>
        <div class="field"><label>Client Secret ${S.clientSecret?'✓ (auto-filled)':''}</label><input id="rf-cs" value="${S.clientSecret}" class="${S.clientSecret?'af':''}" /></div>
      </div>
      <div class="actions">
        <button class="btn btn-p" onclick="doRefresh()">Refresh →</button>
        <span class="status" id="rf-s"></span>
      </div>
      <div class="resp" id="rf-r">Waiting for response...</div>
    </div>
    <div class="info"><strong>Rotation kya hai?</strong><br/>Jab refresh token use hota hai — purana <code>usedAt</code> set hota hai, naya token milta hai. Agar koi purana token dobara bheje — <strong style="color:var(--red)">theft detected!</strong> Server us client ke saare tokens <code>revokedAt</code> set karke revoke kar deta hai.</div>
  `
};

function goStep(n) {
  S.step = n;
  render();
  document.getElementById('content').scrollTop = 0;
}

function setMode(m) { S.mode = m; render(); }

function render() {
  for (let i = 0; i <= 6; i++) {
    const el = document.getElementById('s'+i);
    el.className = 'step-btn';
    if (S.done.has(i)) el.classList.add('done');
    if (i === S.step) el.classList.add('active');
  }
  document.getElementById('content').innerHTML = P[S.step]();
  updateState();
}

function markDone(n, next) {
  S.done.add(n);
  render();
  if (next !== undefined) setTimeout(() => goStep(next), 900);
}

function st(id, msg, ok) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'status ' + (ok?'ok':'err');
  el.textContent = msg;
}

function sr(id, data, ok) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'resp ' + (ok?'ok':'err');
  el.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
}

async function doClientReg() {
  const name = document.getElementById('r-name').value;
  const ruri = document.getElementById('r-ruri').value;
  const scopes = document.getElementById('r-scopes').value.split(' ').filter(Boolean);
  try {
    const res = await fetch(BASE+'/clients/register', { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include', body:JSON.stringify({name, redirectUris:[ruri], allowedScopes:scopes}) });
    const data = await res.json();
    sr('cr-r', data, res.ok);
    if (res.ok) {
      S.clientId = data.clientId;
      S.clientSecret = data.clientSecret;
      st('cr-s', '✓ Client registered! ID & Secret auto-saved.', true);
      markDone(0, 1);
    } else { st('cr-s', '✗ '+(data.error||'Failed'), false); }
  } catch(e) {
    sr('cr-r', 'Network error: '+e.message+'\n\nMake sure:\n1. Server running on :3000\n2. CORS enabled:\n   app.use(cors({ origin: true, credentials: true }))', false);
    st('cr-s', '✗ Network error', false);
  }
}

async function doAuth() {
  const email = document.getElementById('u-email').value;
  const pass = document.getElementById('u-pass').value;
  const isR = S.mode === 'register';
  const body = isR ? {email, passwordHash:pass, name:document.getElementById('u-name')?.value||email.split('@')[0]} : {email, passwordHash:pass};
  try {
    const res = await fetch(BASE+'/auth/'+(isR?'register':'login'), { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include', body:JSON.stringify(body) });
    const data = await res.json();
    sr('auth-r', data, res.ok);
    if (res.ok) {
      S.session = true;
      st('auth-s', '✓ Session active! Cookie set.', true);
      markDone(1, 2);
    } else { st('auth-s', '✗ '+(data.error||'Failed'), false); }
  } catch(e) {
    sr('auth-r', 'Network error: '+e.message, false);
    st('auth-s', '✗ Network error', false);
  }
}

function buildUrl() {
  const cid = document.getElementById('az-cid').value;
  const ruri = document.getElementById('az-ruri').value;
  const scope = document.getElementById('az-scope').value;
  const state = document.getElementById('az-state').value;
  const url = `${BASE}/oauth2/authorize?response_type=code&client_id=${cid}&redirect_uri=${encodeURIComponent(ruri)}&scope=${encodeURIComponent(scope)}&state=${state}`;
  S._url = url;
  document.getElementById('az-url').textContent = url;
  st('az-s', '✓ URL ready — copy & open in browser!', true);
  markDone(2);
}

function copyUrl() {
  if (!S._url) return;
  navigator.clipboard.writeText(S._url);
  st('az-s', '✓ Copied to clipboard!', true);
}

function saveCode() {
  const code = document.getElementById('ci').value.trim();
  if (!code) { st('ci-s', '✗ Code required', false); return; }
  S.code = code;
  st('ci-s', '✓ Code saved!', true);
  markDone(3, 4);
}

async function doToken() {
  const code = document.getElementById('t-code').value;
  const cid = document.getElementById('t-cid').value;
  const cs = document.getElementById('t-cs').value;
  const ruri = document.getElementById('t-ruri').value;
  try {
    const res = await fetch(BASE+'/validation/token', { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include', body:JSON.stringify({grant_type:'authorization_code', code, client_id:cid, client_secret:cs, redirect_uri:ruri}) });
    const data = await res.json();
    sr('t-r', data, res.ok);
    if (res.ok) {
      S.accessToken = data.access_token||'';
      S.refreshToken = data.refresh_token||'';
      S.idToken = data.id_token||'';
      st('t-s', '✓ Tokens received & saved!', true);
      markDone(4, 5);
    } else { st('t-s', '✗ '+(data.error||'Failed'), false); }
  } catch(e) { sr('t-r', 'Network error: '+e.message, false); }
}

async function doUserinfo() {
  const token = document.getElementById('ui-t').value.trim();
  try {
    const res = await fetch(BASE+'/info/userinfo', { headers:{'Authorization':'Bearer '+token}, credentials:'include' });
    const data = await res.json();
    sr('ui-r', data, res.ok);
    if (res.ok) {
      st('ui-s', '✓ User data received!', true);
      markDone(5, 6);
    } else { st('ui-s', '✗ '+(data.error||'Invalid token'), false); }
  } catch(e) { sr('ui-r', 'Network error: '+e.message, false); }
}

async function doRefresh() {
  const rt = document.getElementById('rf-rt').value;
  const cid = document.getElementById('rf-cid').value;
  const cs = document.getElementById('rf-cs').value;
  try {
    const res = await fetch(BASE+'/validation/token', { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include', body:JSON.stringify({grant_type:'refresh_token', refresh_token:rt, client_id:cid, client_secret:cs}) });
    const data = await res.json();
    sr('rf-r', data, res.ok);
    if (res.ok) {
      if (data.access_token) S.accessToken = data.access_token;
      if (data.refresh_token) S.refreshToken = data.refresh_token;
      st('rf-s', '✓ New tokens received! Old refresh token now invalid.', true);
      markDone(6);
      updateState();
    } else { st('rf-s', '✗ '+(data.error||'Failed'), false); }
  } catch(e) { sr('rf-r', 'Network error: '+e.message, false); }
}

render();
</script>
</body>
</html>
